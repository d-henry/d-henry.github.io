site_name: Preacher's Docs
site_url: https://preach-notes.com

nav:
    - Home: index.md
    - About: about.md
    - Testing:
        - Playwright: playwright.md
        - Selenium: selenium.md
        - API Testing: api-testing.md
    - Tools:
        - Git: git.md
        - AI Tools: ai-tools.md
        - Obsidian + GitHub Sync: obsidian-sync.md

theme:
    name: material
    favicon: img/favicon.png
    palette:
        scheme: slate
        primary: black
        accent: light green
    features:
        - navigation.sections
        - navigation.top
        - content.code.copy

extra:
    social:
        - icon: fontawesome/brands/github
          link: https://github.com/d-henry
        - icon: fontawesome/brands/linkedin
          link: https://www.linkedin.com/in/dylan-henry-39b42b153/
        - icon: fontawesome/solid/envelope
          link: mailto:d.arthur.henry@gmail.com

extra_css:
    - css/custom.css

markdown_extensions:
    - pymdownx.highlight:
        anchor_linenums: true
    - pymdownx.superfences
    - pymdownx.inlinehilite
    - tables